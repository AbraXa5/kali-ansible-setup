# roles/install_tools/tasks/install_pipx.yml
---
# LEGACY: pipx install tasks — superseded by install_uv_tools.yml (uv tool install).
# Kept for reference. To use, add `import_tasks: install_pipx.yml` in main.yml
# and ensure pip_packages / pipx_git_install_tools are defined in vars.

# Redundant with new kali python installation configs
# - name: Install pipx
#  environment:
#    PIP_REQUIRE_VIRTUALENV: "false"
#  ansible.builtin.pip:
#    name: pipx
#    state: present

- name: Install pipx
  become: true
  become_user: root
  ansible.builtin.apt:
    name: pipx
    state: present

- name: Set pipx path
  ansible.builtin.command: python3 -m pipx ensurepath
  args:
    creates: "/home/{{ ansible_user }}/.local/bin/pipx"

- name: Install pipx modules
  community.general.pipx:
    name: "{{ item }}"
    state: latest
  loop: "{{ pip_packages }}"

- name: "Install pipx tools via github"
  community.general.pipx:
    name: "{{ item.name }}"
    source: "{{ item.src }}"
    state: latest
  loop: "{{ pipx_git_install_tools }}"
