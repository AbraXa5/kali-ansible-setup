# roles/install_tools/tasks/install_tools_apt.yml
---
- name: Install base packages and dependencies
  tags: install_tools
  become: true
  ansible.builtin.apt:
    name:
      - git
      - curl
      - wget
      - nmap
      - unzip
      - python3
      # - python3-pip  # managed by uv
      - python3-venv
      - libc6-dev-i386
      # for naabu
      - libpcap-dev
      # for massdns
      - libldns-dev
      # Installing pycurl against openssl for wfuzz
      - libcurl4-openssl-dev
      - python3-pycurl
      - avahi-daemon
      - libwacom-common
      # zlib dependency for pillow
      - libjpeg-dev
      - libpng-dev
      - libssl-dev
      - libffi-dev
      # kerberos dependencies
      - libkrb5-dev
      - krb5-config
      - krb5-user
      - cifs-utils
      - cmake
    state: latest
  # noqa: package-latest

- name: Install additional helper packages
  tags: install_tools
  become: true
  ansible.builtin.apt:
    name:
      - micro
      - neovim
      - tmux
      - terminator
      - bat
      # - exa # Removed from repos
      - gh
      - htop
      - silversearcher-ag
      - xclip
      - ncdu
      - nnn
      - peco
      - jq
      - yq
      - ltrace
      - extract
      - toilet
      - fortune-mod
    state: latest
  # noqa: package-latest

- name: Install infosec Tools
  tags: install_tools
  become: true
  ansible.builtin.apt:
    name:
      - ffuf
      - rubygems
      - evil-winrm
      - pngcheck
      - steghide
      - wfuzz
      # - insomnia
      # - hopper-v4
      - gdu
      - remmina
      - feroxbuster
      - dex2jar
      - ghidra
      - chromium
      - mono-complete
      - proxychains
      - rlwrap
      # - tesseract-ocr
      - jd-gui
      - zbar-tools
      - gdb
      - libreoffice
      - getsploit
      - sploitscan
    state: latest
  # noqa: package-latest
