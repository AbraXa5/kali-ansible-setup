chisel_version: "1.11.5"
chisel_platforms:
  - name: "linux_amd64"
    url: "https://github.com/jpillora/chisel/releases/download/v{{ chisel_version
      }}/chisel_{{ chisel_version }}_linux_amd64.gz"
    binary_name: "chisel_linux_amd64"
  - name: "windows_amd64"
    url: "https://github.com/jpillora/chisel/releases/download/v{{ chisel_version
      }}/chisel_{{ chisel_version }}_windows_amd64.gz"
    binary_name: "chisel_windows_amd64.exe"

# gowitness — web screenshot tool (replaces archived aquatone)
gowitness_version: "3.1.1"

# ligolo-ng — modern TUN-based tunneling / pivoting tool
ligolo_ng_version: "0.8.3"
ligolo_ng_files:
  - name: "proxy_linux_amd64"
    url: "https://github.com/nicocha30/ligolo-ng/releases/download/v{{
      ligolo_ng_version }}/ligolo-ng_proxy_{{ ligolo_ng_version
      }}_linux_amd64.tar.gz"
    creates: "ligolo-ng_proxy"
  - name: "agent_linux_amd64"
    url: "https://github.com/nicocha30/ligolo-ng/releases/download/v{{
      ligolo_ng_version }}/ligolo-ng_agent_{{ ligolo_ng_version
      }}_linux_amd64.tar.gz"
    creates: "ligolo-ng_agent"
  - name: "agent_windows_amd64"
    url: "https://github.com/nicocha30/ligolo-ng/releases/download/v{{
      ligolo_ng_version }}/ligolo-ng_agent_{{ ligolo_ng_version
      }}_windows_amd64.zip"
    creates: "ligolo-ng_agent.exe"

